services:
  postgres:
    image: postgres:16-alpine
    container_name: flow_postgres
    environment:
      POSTGRES_USER: flow_user
      POSTGRES_PASSWORD: flow_password
      POSTGRES_DB: flow_db
    ports:
      - '5439:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
